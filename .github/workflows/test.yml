name: Tests
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_call:
jobs:
  quality:
    name: Lint, Format, Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Set up Cachix
        uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Download dependencies
        run: devenv shell -- go mod download
      - name: Run git hooks
        run: devenv tasks run devenv:git-hooks:run --show-output
      - name: Check formatting
        run: |
          make format
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Please run 'make format'"
            git diff
            exit 1
          fi
      - name: Verify dependencies
        run: |
          devenv shell -- go mod verify
          devenv shell -- go mod tidy
          git diff --exit-code go.mod go.sum
  integration-tests:
    name: ${{ matrix.os }} Integration with Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install Nix
        if: runner.os != 'Windows'
        uses: cachix/install-nix-action@v31
      - name: Set up Cachix
        if: runner.os != 'Windows'
        uses: cachix/cachix-action@v16
        with:
          name: devenv
      - name: Install devenv
        if: runner.os != 'Windows'
        run: nix profile add nixpkgs#devenv
      - name: Set up Go
        if: runner.os == 'Windows'
        uses: actions/setup-go@v5
        with:
          go-version-file: '.go-version'
          cache: true
      - name: Download dependencies (Windows)
        if: runner.os == 'Windows'
        run: go mod download
      - name: Download dependencies (Unix)
        if: runner.os != 'Windows'
        run: devenv shell -- go mod download
      - name: Run all tests (including integration)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
          else
            devenv shell -- go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration,${{ runner.os }}
          name: ${{ runner.os }}
